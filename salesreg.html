<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sales Registration</title>
    <link rel="stylesheet" href="sales.css">
  </head>
  <body>
    <button class="btn"><a href="./index.html" title="Profile Page">Previous Work</a></button>
    <h1 style="text-align: center;">SALES REGISTRATION FORM</h1>
    <main>
      <div class="container">
        <div class="sidebar">
          <div><a href="">Dashboard</a></div>
          <div><a href="">Sales Management</a></div>
          <div><a href="">Supplier Management</a></div>
          <div><a href="">Stock Management</a></div>
          <div><a href="">Transport Management</a></div>
        </div>
        <div class="main">
          <form action="">
            <h2>Sales Registration</h2>
            <div class="maincontainer">
              <div class="mainsection1">
                <label for="date">Sale Date</label>
                <input type="date" id="date" />
              </div>
              <div class="mainsection1">
                <label for="rep">Sales Person</label>
                <select name="rep" id="rep">
                  <option value="">Select Sales representative</option>
                  <option value="1">Mirembe Faith</option>
                  <option value="2">Serema Anna</option>
                  <option value="3">Wang Dior</option>
                  <option value="4">Steven Johnson</option>
                  <option value="5">Mirabel Khan</option>
                </select>
              </div>
            </div>
            <h2>Customer Details</h2>
            <div class="maincontainers">
              <div class="mainsection2">
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Enter full name" />
              </div>
              <div class="mainsection2">
                <label for="number">Phone Number</label>
                <input
                  type="tel"
                  id="number"
                  placeholder="Enter Phone Number"
                  maxlength="10"
                />
              </div>
              <div class="mainsection2">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter email" />
              </div>
              <div class="mainsection2">
                <label for="type">Type</label>
                <select name="type" id="type">
                  <option value="">Select customer type</option>
                  <option value="1">Loyal customer</option>
                  <option value="2">New customer</option>
                  <option value="3">Usual customer</option>
                  required
                </select>
              </div>
            </div>
            <h2>Items</h2>
            <div class="maincontainerss">
              <div class="mainsection3">
                <label for="id">Pdt Id</label>
                <input type="number" id="id" placeholder="Pdt ID" />
              </div>
              <div class="mainsection3">
                <label for="qty">Quantity</label>
                <input type="number" id="qty" />
              </div>
              <div class="mainsection3">
                <label for="up">Unit Price</label>
                <input type="number" id="up" />
              </div>
              <div class="mainsection3">
                <label for="pdt">Pdt Id</label>
                <input type="text" id="pdt" placeholder="Pdt ID" />
              </div>
              <div class="mainsection3">
                <label for="qnty">Quantity</label>
                <input type="number" id="qnty" />
              </div>
              <div class="mainsection3">
                <label for="upc">Unit Price</label>
                <input type="number" id="upc" />
              </div>
            </div>
            <div class="btncontain">
              <div>
                <button class="noo" type="reset">Cancel</button>
              </div>
              <div>
                <button class="yeas" type="submit">Submit</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </main>
  </body>
</html>
