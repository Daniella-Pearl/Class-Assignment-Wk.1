        <div>
          <h2 id="bd">Business Details</h2>
          <form>
            <div class="main">
              <div class="grid">
                <label for="inputState">Business Category*</label>
                <select id="inputState">
                  <option selected>Choose...</option>
                  <option>Manufacturing</option>
                  <option>Wholesale / Distribution</option>
                  <option>Services</option>
                  <option>Other</option>
                  required
                </select>
              </div>
              <div class="grid">
                <label for="inputState">Number of Employees*</label>
                <select id="inputState">
                  <option selected>Select range</option>
                  <option>1 to 50</option>
                  <option>50 to 100</option>
                  <option>100 to 200</option>
                  <option>200+</option>
                </select>
              </div>
               <div class="grid">
                <label for="website">Website</label>
                <input
                  type="url"
                  id="website"
                  placeholder="https://example.com"
                  required
                />
              </div>
             
              <div class="grid">
                <label for="inputState">Annual Revenue(Ushs.)</label>
                <select id="inputState">
                  <option selected>Select range</option>
                  <option>0-100,000 (Ushs.)</option>
                  <option>100,000-1,000,000 (Ushs)</option>
                  <option>1,000,000-10,000,000 (Ushs)</option>
                  <option>Above 10,000,000(Ushs)</option>
                </select>
              </div>
              <div class="grid">
                <label for="exampleFormControlTextarea1"
                  >Products / Services Offered*</label
                >
                <textarea
                  id="exampleFormControlTextarea1"
                  rows="3"
                  placeholder="Describe the products or services you provide...."
                  required
